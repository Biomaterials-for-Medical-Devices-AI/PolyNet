# =============================================================================
# PolyNet Experiment Configuration
# =============================================================================
# Edit this file to describe your experiment. Then run:
#
#   python scripts/run_pipeline.py --config configs/experiment.yaml
#
# All paths are relative to the project root unless they start with /

# -----------------------------------------------------------------------------
# Experiment metadata
# -----------------------------------------------------------------------------
experiment:
  name: "my_polymer_experiment"
  output_dir: "results"   # all outputs written here
  random_seed: 42

# -----------------------------------------------------------------------------
# Data
# -----------------------------------------------------------------------------
data:
  data_name: "polymers_all.csv"
  data_path: "./datasets/bacteria_all/raw/polymers_all.csv"       # path to your CSV file
  smiles_cols: ["smiles_monomer_1", "smiles_monomer_2"]
  canonicalise_smiles: true
  target_variable_col: "isFluo_PA"                    # column to predict
  problem_type: "classification"                # "regression" or "classification"
  string_representation: "smiles"
  id_col: "id"                      # unique sample identifier column
  num_classes: 2                # Number of output classes. Use 1 for regression, N for N-class classification
  target_variable_name: "Is Fluo PA"                         # human-readable name (used in plots)

  # For classification only — maps integer class labels to display names
  # Leave null for regression or if you don't want custom labels
  # class_names: null
  class_names:
    "0": "AntiBiofilm"
    "1": "ProBiofilm"
  target_variable_units: null

# -----------------------------------------------------------------------------
# Representations
# -----------------------------------------------------------------------------
representations:

  smiles_merge_approach: "weighted_average"   # weighted_average | average | concatenate

  # --- Graph representation (for GNN models) ---
  node_features:
    GetAtomicNum:
      allowable_vals: [1, 2, 3]
      wildcard: true
  edge_features:
    GetBondTypeAsDouble:
      allowable_vals: [1, 2, 3]
      wildcard: true

  # --- Vector descriptors (for TML models) ---
  molecular_descriptors: {
    "rdkit": "all",   # compute all RDKit descriptors
    "polybert": true,
    "polymetrix": {
      "side_chain": [
        "num_hbond_donors",
        "num_hbond_acceptors",
        "num_rotatable_bonds",
        "num_rings",
        "num_non_aromatic_rings",
        "num_aromatic_rings",
        "num_atoms",
        "topological_surface_area",
        "fraction_bicyclic_rings",
        "num_aliphatic_heterocycles",
        "molecular_weight",
        "sp3_carbon_count",
        "sp2_carbon_count",
        "halogen_counts",
        "bond_counts",
        "max_ring_size",
        "heteroatom_count",
        "heteroatom_density"
      ],
      "backbone": [
        "num_hbond_donors",
        "num_hbond_acceptors",
        "num_rotatable_bonds",
        "num_rings",
        "num_non_aromatic_rings",
        "num_aromatic_rings",
        "num_atoms",
        "topological_surface_area",
        "fraction_bicyclic_rings",
        "num_aliphatic_heterocycles",
        "molecular_weight",
        "sp3_carbon_count",
        "sp2_carbon_count",
        "halogen_counts",
        "bond_counts",
        "max_ring_size",
        "heteroatom_count",
        "heteroatom_density"
      ],
      "agg": ["sum", "mean"]
    }
  }
  # Map each smiles column to its weight fraction column
  # Set to null if your dataset has no weight fractions
  weights_col:
    smiles_monomer_1: "ratio_1"
    smiles_monomer_2: "ratio_2"

# -----------------------------------------------------------------------------
# Data splitting
# -----------------------------------------------------------------------------
splitting:
  split_type: "train_val_test"       # TrainValTest | LeaveOneOut
  split_method: "random"           # Random | Scaffold (scaffold requires RDKit)
  train_set_balance: null
  test_ratio: 0.15
  val_ratio: 0.15
  n_bootstrap_iterations: 2        # number of train/val/test splits to generate

  # Optional: balance training set for imbalanced classification
  # train_set_balance: 0.5

# -----------------------------------------------------------------------------
# GNN models
# GNN architectures to train. Set hyperparameters explicitly,
# or leave the block empty ({}) to trigger automatic HPO via Ray Tune.
# -----------------------------------------------------------------------------
gnn_training:
  train_gnn: true
  gnn_convolutional_layers:
    GCN:
      LearningRate: 0.001
      BatchSize: 32
      improved: false
      embedding_dim: 64
      n_convolutions: 3
      readout_layers: 2
      dropout: 0.1
      pooling: "global_mean_pool"

    # GAT:
    #   LearningRate: 0.001
    #   BatchSize: 32
    #   num_heads: 4
    #   embedding_dim: 64
    #   n_convolutions: 3
    #   readout_layers: 2
    #   dropout: 0.1

    # CGGNN:
    #   LearningRate: 0.001
    #   BatchSize: 32
    #   embedding_dim: 64
    #   n_convolutions: 3
    #   readout_layers: 2
    #   dropout: 0.1

    # MPNN: {}   # empty = trigger HPO

training:
  epochs: 250

# -----------------------------------------------------------------------------
# TML models
# Traditional ML models trained on descriptor vectors.
# Only active when representations.descriptors.enabled is true.
# Leave the block empty ({}) to trigger GridSearchCV HPO.
# -----------------------------------------------------------------------------
feature_preprocessing:
  scaler: "standard_scaler"
  selectors:
    variance:
      threshold: 0.05
    correlation:
      threshold: 0.95

tml_models:
  train_tml: true

  selected_models:
    random_forest:
      n_estimators: 200
      max_depth: 10

    xgboost:
      n_estimators: 200
      max_depth: 6
      learning_rate: 0.05

    # SupportVectorMachine: {}   # empty = trigger HPO

# -----------------------------------------------------------------------------
# Explainability
# Only applied to GNN models. Requires gnn_training.train_gnn: true
# Uses chemistry-masking attribution (Wellawatte et al., Nat. Commun. 2023):
#   attribution(fragment) = Y_pred_full − Y_pred_masked
# -----------------------------------------------------------------------------
explainability:
  enabled: false
  algorithm: "chemistry_masking"

  # Which GNN architectures to explain.
  # Must match keys in gnn_training.gnn_convolutional_layers (e.g. GCN, GAT).
  # "all" explains every trained architecture.
  models: "all"
  # models: [GCN, GAT]

  # Which bootstrap iteration indices to explain (0-based, matching training).
  # "all" explains every trained iteration.
  # Combined with models as a cross-product:
  #   models: [GCN, GAT] + bootstraps: [0, 2]  →  GCN_0, GCN_2, GAT_0, GAT_2
  bootstraps: "all"
  # bootstraps: [0, 1]

  # Molecular fragmentation strategy.
  fragmentation: "brics"             # brics | recap | murcko_scaffold | functional_groups

  # Data split to draw molecules from for the global distribution plot.
  explain_set: "test"                # train | validation | test | all

  # Normalisation applied to attribution scores before plotting.
  normalisation: "per_model"         # local | global | per_model | no_normalisation

  # For classification: which class to attribute (null for regression).
  target_class: null

  # Attribution distribution plot style.
  plot_type: "ridge"                 # ridge | bar | strip

  # Show only the top-N and bottom-N fragments by mean attribution.
  # null shows every fragment.
  top_n: 10

  # Molecule IDs to generate per-molecule heatmaps and attribution tables for.
  # When null (default), the local explanation step is skipped entirely.
  local_explain_mol_ids: null
  # local_explain_mol_ids:
  #   - "poly_0001"

# -----------------------------------------------------------------------------
# TML SHAP Explainability
# Requires tml_models.train_tml: true and descriptor representations.
# -----------------------------------------------------------------------------
tml_explainability:
  enabled: false

  # TML model types to explain, e.g. [RandomForest, XGBoost].
  # "all" explains every trained TML model type.
  models: "all"

  # Descriptor representations to explain, e.g. [morgan, rdkit].
  # "all" explains every trained descriptor.
  representations: "all"

  # Bootstrap iteration indices to explain (0-based).
  # "all" explains every trained iteration.
  bootstraps: "all"

  # Data split to draw samples from for the global distribution plot.
  explain_set: "test"              # train | validation | test | all

  # Normalisation applied to SHAP scores before plotting.
  normalisation: "per_model"       # local | global | per_model | no_normalisation

  # For classification: which class to attribute (null for regression).
  target_class: null

  # SHAP attribution distribution plot style.
  plot_type: "ridge"               # ridge | bar | strip

  # Show only the top-N features by mean |SHAP|.
  # null shows all features.
  top_n: 10

  # Sample IDs to generate per-instance waterfall/force plots for.
  # When null (default), the local explanation step is skipped entirely.
  local_explain_sample_ids: null
  # local_explain_sample_ids:
  #   - "poly_0001"

  # Plot style for per-instance SHAP explanations.
  local_plot_type: "waterfall"     # waterfall | force | bar